<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} - 管理后台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 200px;
      background: #001529;
      color: #fff;
    }

    .logo {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .menu-item {
      padding: 14px 24px;
      cursor: pointer;
      transition: all 0.2s;
      color: rgba(255,255,255,0.65);
    }

    .menu-item:hover,
    .menu-item.active {
      color: #fff;
      background: rgba(255,255,255,0.1);
    }

    .main {
      flex: 1;
    }

    .header {
      height: 64px;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .content {
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #333;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 600;
      color: #333;
    }

    .stat-label {
      font-size: 14px;
      color: #999;
      margin-top: 8px;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
    }

    .table th,
    .table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #f0f0f0;
    }

    .table th {
      background: #fafafa;
      font-weight: 600;
      color: #333;
    }

    .table td {
      color: #666;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .badge-success {
      background: #f6ffed;
      color: #52c41a;
    }

    .badge-warning {
      background: #fffbe6;
      color: #faad14;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="sidebar">
      <div class="logo">{{title}}</div>
      <div class="menu-item active">仪表盘</div>
      <div class="menu-item">用户管理</div>
      <div class="menu-item">订单管理</div>
      <div class="menu-item">数据统计</div>
      <div class="menu-item">系统设置</div>
    </div>

    <div class="main">
      <div class="header">
        <span>管理后台</span>
        <span>👤 管理员</span>
      </div>

      <div class="content">
        <div class="card">
          <div class="card-title">数据概览</div>
          <div class="stat-grid">
            <div class="stat-item">
              <div class="stat-value">1,234</div>
              <div class="stat-label">总用户数</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">¥56,789</div>
              <div class="stat-label">今日收入</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">892</div>
              <div class="stat-label">订单数量</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">98.5%</div>
              <div class="stat-label">转化率</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">最新订单</div>
          <table class="table">
            <thead>
              <tr>
                <th>订单号</th>
                <th>用户</th>
                <th>金额</th>
                <th>状态</th>
                <th>时间</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>ORDER001</td>
                <td>张三</td>
                <td>¥299.00</td>
                <td><span class="badge badge-success">已完成</span></td>
                <td>2024-01-15 14:30</td>
              </tr>
              <tr>
                <td>ORDER002</td>
                <td>李四</td>
                <td>¥599.00</td>
                <td><span class="badge badge-warning">处理中</span></td>
                <td>2024-01-15 14:25</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 交互逻辑
    document.querySelectorAll('.menu-item').forEach(item => {
      item.addEventListener('click', function() {
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        this.classList.add('active');
      });
    });
  </script>
</body>
</html>
