<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .phone-frame {
      width: 375px;
      min-height: 667px;
      background: #fff;
      border-radius: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      overflow: hidden;
      position: relative;
    }

    .status-bar {
      height: 44px;
      background: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      font-size: 14px;
      font-weight: 600;
    }

    .nav-bar {
      height: 50px;
      background: #fff;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 17px;
      font-weight: 600;
    }

    .content {
      flex: 1;
      overflow-y: auto;
    }

    .list-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.2s;
    }

    .list-item:hover {
      background: #f9f9f9;
    }

    .list-item .icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: #e8f4ff;
      margin-right: 12px;
    }

    .list-item .text {
      flex: 1;
    }

    .list-item .title {
      font-size: 16px;
      color: #333;
      margin-bottom: 4px;
    }

    .list-item .desc {
      font-size: 13px;
      color: #999;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #007AFF;
      color: #fff;
    }

    .btn-primary:hover {
      background: #0056b3;
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .tab-bar {
      height: 50px;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex;
      align-items: center;
    }

    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .tab-item.active {
      color: #007AFF;
    }

    .tab-icon {
      width: 24px;
      height: 24px;
      background: #ddd;
      border-radius: 4px;
      margin-bottom: 4px;
    }

    .tab-item.active .tab-icon {
      background: #007AFF;
    }

    .tab-label {
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="status-bar">
      <span>9:41</span>
      <span>📶 🔋</span>
    </div>

    <div class="nav-bar">
      ← {{title}}
    </div>

    <div class="content">
      <!-- 内容区域 -->
    </div>

    <div class="tab-bar">
      <div class="tab-item active">
        <div class="tab-icon"></div>
        <span class="tab-label">首页</span>
      </div>
      <div class="tab-item">
        <div class="tab-icon"></div>
        <span class="tab-label">发现</span>
      </div>
      <div class="tab-item">
        <div class="tab-icon"></div>
        <span class="tab-label">我的</span>
      </div>
    </div>
  </div>

  <script>
    // 交互逻辑
    document.querySelectorAll('.tab-item').forEach(item => {
      item.addEventListener('click', function() {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
      });
    });
  </script>
</body>
</html>
