<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q助理首页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .phone-frame {
      width: 375px;
      min-height: 812px;
      background: #fff;
      border-radius: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      overflow: hidden;
      position: relative;
    }

    /* 状态栏 */
    .status-bar {
      height: 44px;
      background: linear-gradient(135deg, #09AB4F 0%, #07c756 100%);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
    }

    /* 顶部导航 */
    .top-nav {
      background: linear-gradient(135deg, #09AB4F 0%, #07c756 100%);
      padding: 12px 16px 16px;
    }

    .top-nav-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: #fff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .message-icon {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
      margin-left: auto;
      cursor: pointer;
    }

    /* 搜索框 */
    .search-box {
      margin-top: 12px;
      background: #fff;
      border-radius: 24px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .search-icon {
      color: #999;
      font-size: 14px;
    }

    .search-text {
      color: #999;
      font-size: 14px;
    }

    /* 内容区域 */
    .content {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 60px;
    }

    /* Banner */
    .banner {
      width: 100%;
      height: 140px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 12px 16px;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }

    .banner-content {
      padding: 20px;
      color: #fff;
    }

    .banner-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .banner-desc {
      font-size: 13px;
      opacity: 0.9;
    }

    /* 功能卡片区域 */
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      padding: 16px 16px 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 0 16px;
    }

    .grid-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .grid-item:active {
      transform: scale(0.95);
    }

    .grid-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .grid-label {
      font-size: 12px;
      color: #333;
      text-align: center;
    }

    /* 底部Tab栏 */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #fff;
      border-top: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #999;
      transition: color 0.2s;
    }

    .tab-item.active {
      color: #09AB4F;
    }

    .tab-icon {
      font-size: 20px;
      margin-bottom: 2px;
    }

    .tab-label {
      font-size: 10px;
    }
  </style>
  <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5090374_05pdb64jf61u.css">
</head>
<body>
  <div class="phone-frame">
    <!-- 状态栏 -->
    <div class="status-bar">
      <span>9:41</span>
      <span style="display: flex; gap: 6px;">
        <i class="cifang-iconfont信号"></i>
        <i class="cifang-iconfontdianliang"></i>
      </span>
    </div>

    <!-- 顶部导航 -->
    <div class="top-nav">
      <div class="top-nav-row">
        <div class="logo-area">
          <div class="logo">
            <img src="https://res.qzhuli.com/static/logo_64.png" alt="Q助理">
          </div>
          <span class="logo-text">Q助理</span>
        </div>
        <div class="message-icon">
          <i class="cifang-iconfontxiaoxi"></i>
        </div>
      </div>
      <div class="search-box">
        <i class="cifang-iconfontsousuo search-icon"></i>
        <span class="search-text">搜索功能、助手...</span>
      </div>
    </div>

    <!-- 内容 -->
    <div class="content">
      <!-- Banner -->
      <div class="banner">
        <div class="banner-content">
          <div class="banner-title">为了人类永生</div>
          <div class="banner-desc">用Q助理，创造另一个你</div>
        </div>
      </div>

      <!-- 功能卡片 -->
      <div class="section-title">存储的记忆越多，助理模仿得越像</div>
      <div class="grid">
        <div class="grid-item">
          <div class="grid-icon" style="background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);">
            <i class="cifang-iconfonttongxuelu" style="color: #fff;"></i>
          </div>
          <span class="grid-label">同学录</span>
        </div>
        <div class="grid-item">
          <div class="grid-icon" style="background: linear-gradient(135deg, #ffd93d 0%, #f5c800 100%);">
            <i class="cifang-iconfontxiangce" style="color: #fff;"></i>
          </div>
          <span class="grid-label">时光相册</span>
        </div>
        <div class="grid-item">
          <div class="grid-icon" style="background: linear-gradient(135deg, #6bcb77 0%, #4caf50 100%);">
            <i class="cifang-iconfontlishi" style="color: #fff;"></i>
          </div>
          <span class="grid-label">人生经历</span>
        </div>
        <div class="grid-item">
          <div class="grid-icon" style="background: linear-gradient(135deg, #4d96ff 0%, #3b8dff 100%);">
            <i class="cifang-iconfontmaikefeng" style="color: #fff;"></i>
          </div>
          <span class="grid-label">特有嗓音</span>
        </div>
        <div class="grid-item">
          <div class="grid-icon" style="background: linear-gradient(135deg, #a29bfe 0%, #8c7ae6 100%);">
            <i class="cifang-iconfontjineng" style="color: #fff;"></i>
          </div>
          <span class="grid-label">擅长能力</span>
        </div>
        <div class="grid-item">
          <div class="grid-icon" style="background: linear-gradient(135deg, #fd79a8 0%, #e84393 100%);">
            <i class="cifang-iconfontguandian" style="color: #fff;"></i>
          </div>
          <span class="grid-label">观点和理想</span>
        </div>
        <div class="grid-item">
          <div class="grid-icon" style="background: linear-gradient(135deg, #00cec9 0%, #00b894 100%);">
            <i class="cifang-iconfontwenda" style="color: #fff;"></i>
          </div>
          <span class="grid-label">问题与回答</span>
        </div>
        <div class="grid-item">
          <div class="grid-icon" style="background: linear-gradient(135deg, #b2bec3 0%, #636e72 100%);">
            <i class="cifang-iconfontquanbu" style="color: #fff;"></i>
          </div>
          <span class="grid-label">全部技能</span>
        </div>
      </div>

      <!-- 为你推荐 -->
      <div class="section-title" style="margin-top: 20px;">为你推荐</div>
      <div style="padding: 0 16px;">
        <div style="background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
          <div style="font-size: 15px; font-weight: 600; color: #333; margin-bottom: 8px;">如何创建我的数字分身？</div>
          <div style="font-size: 13px; color: #666; line-height: 1.5;">首先进入"人生经历"功能，填写你的基本信息、经历故事...</div>
        </div>
        <div style="background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
          <div style="font-size: 15px; font-weight: 600; color: #333; margin-bottom: 8px;">同学录怎么使用？</div>
          <div style="font-size: 13px; color: #666; line-height: 1.5;">创建班级后，可以邀请同学加入，一起分享照片和回忆...</div>
        </div>
      </div>
    </div>

    <!-- 底部Tab栏 -->
    <div class="tab-bar">
      <div class="tab-item active">
        <i class="cifang-iconfontshouye tab-icon"></i>
        <span class="tab-label">首页</span>
      </div>
      <div class="tab-item">
        <i class="cifang-iconfontxiangce tab-icon"></i>
        <span class="tab-label">相册</span>
      </div>
      <div class="tab-item">
        <i class="cifang-iconfontxiaoxi tab-icon"></i>
        <span class="tab-label">消息</span>
      </div>
      <div class="tab-item">
        <i class="cifang-iconfontwode tab-icon"></i>
        <span class="tab-label">我的</span>
      </div>
    </div>
  </div>

  <script>
    // Tab切换
    document.querySelectorAll('.tab-item').forEach(item => {
      item.addEventListener('click', function() {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
      });
    });

    // 卡片点击效果
    document.querySelectorAll('.grid-item').forEach(item => {
      item.addEventListener('click', function() {
        this.style.transform = 'scale(0.95)';
        setTimeout(() => {
          this.style.transform = 'scale(1)';
        }, 100);
      });
    });
  </script>
</body>
</html>
